ai:
  model: "meta/llama-3.1-8b-instruct"
  temperature: 0.7
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key_env: "NVIDIA_API_KEY"

calendar:
  token_env: "NOTION_TOKEN"
  database_id_env: "DATABASE_ID"

platform:
  token_env: "TELEGRAM_TOKEN"

system_prompts:
  # Default system prompt used as foundation - plugins will add their specific content
  default: |-
    You are LushJr, a helpful AI assistant.

    Your responsibilities:
    - Assist the user with various tasks using available tools.
    - Detect the language of the user's message and respond in that same language.
    - Be concise, friendly, and proactive.